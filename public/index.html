<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fission - Multiplayer Chain Reaction</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="app">
    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
      <h1>Fission</h1>
      <p>Multiplayer Chain Reaction</p>

      <div class="card">
        <input type="text" id="player-name" placeholder="Enter Display Name" maxlength="15">

        <div class="actions">
          <button id="btn-create" class="neon-button primary">Create Room</button>

          <div class="divider">OR</div>

          <div class="join-group">
            <input type="text" id="room-code-input" placeholder="Room Code" maxlength="4"
              style="text-transform: uppercase;">
            <button id="btn-join" class="neon-button secondary">Join</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Lobby Screen -->
    <div id="lobby-screen" class="screen">
      <h2>Room: <span id="display-room-code-plain">----</span></h2>

      <div class="players-list card">
        <h3>Players</h3>
        <ul id="players-ul"></ul>
      </div>

      <div id="room-code-container" class="room-code-container"
        style="display: none; margin-top: 25px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px dashed var(--neon-blue);">
        <p style="margin-bottom: 5px; font-size: 0.9rem; color: #aaa;">Invite Friends</p>
        <div style="display: flex; gap: 15px; justify-content: center; align-items: center; margin-bottom: 10px;">
          <button id="btn-copy" class="neon-button secondary"
            style="padding: 5px 15px; width: auto; font-size: 0.9rem;">Copy Link</button>
          <button id="btn-share" class="neon-button primary"
            style="padding: 5px 15px; width: auto; font-size: 0.9rem;">Share Link</button>
        </div>
        <h2 id="display-room-code" style="letter-spacing: 5px; color: var(--neon-pink); margin-top: 10px;">----</h2>
        <span id="copy-toast" style="display:none; color: var(--neon-green); font-size: 0.8rem; margin-top: 5px;">Copied
          to clipboard!</span>
      </div>

      <div class="host-controls" style="margin-top: 20px;">
        <button id="btn-start" class="neon-button success" style="display:none">Start Game</button>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
      <!-- Game Board will be injected here -->
      <div id="game-info">
        <h3>Turn: <span id="current-turn-name">Wait</span></h3>
        <p id="game-over-msg"
          style="display:none; margin-top: 5px; color: var(--neon-blue-dim); font-weight: bold; letter-spacing: 1.5px;">
          THE CHAIN REACTION HAS SETTLED.</p>
        <button id="btn-home" class="neon-button primary" style="display:none; margin-top: 15px; padding: 8px;">Main
          Menu</button>
      </div>
      <div id="board-container"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>

</html>
