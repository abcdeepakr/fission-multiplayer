<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fission - Windows 98 Edition</title>
  <!-- Using 98.css from CDN for genuine windows 98 aesthetic -->
  <link rel="stylesheet" href="https://unpkg.com/98.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="app">
    <!-- Start Screen -->
    <div id="start-screen" class="screen active window">
      <div class="title-bar">
        <div class="title-bar-text">Fission_Multiplayer.exe</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize"></button>
          <button aria-label="Close"></button>
        </div>
      </div>
      <div class="window-body" style="padding: 10px;">
        <p style="text-align: center; margin-bottom: 15px;">Welcome to Fission!</p>

        <div class="field-row" style="margin-bottom: 10px;">
          <label for="player-name" style="width: 50px;">Name:</label>
          <input type="text" id="player-name" placeholder="Guest" maxlength="15" style="flex: 1;">
        </div>

        <div class="actions" style="margin-top: 15px;">
          <button id="btn-create" style="width: 100%; margin-bottom: 10px; font-weight: bold;">Create Room</button>

          <fieldset>
            <legend>Join Existing Room</legend>
            <div class="field-row">
              <label for="room-code-input" style="width: 50px;">Code:</label>
              <input type="text" id="room-code-input" placeholder="ABCD" maxlength="4"
                style="text-transform: uppercase; width: 60px;">
              <button id="btn-join" style="margin-left: 10px; flex: 1;">Join</button>
            </div>
          </fieldset>
        </div>
      </div>
    </div>

    <!-- Lobby Screen -->
    <div id="lobby-screen" class="screen window">
      <div class="title-bar">
        <div class="title-bar-text">Lobby - Room <span id="display-room-code-plain">----</span></div>
        <div class="title-bar-controls">
          <button aria-label="Close"></button>
        </div>
      </div>

      <div class="window-body" style="padding: 10px;">
        <fieldset>
          <legend>Players Connected</legend>
          <ul id="players-ul" class="tree-view" style="height: 80px; overflow: auto; background: #fff;"></ul>
        </fieldset>

        <fieldset id="room-code-container" style="display: none; margin-top: 10px;">
          <legend>Invite Details</legend>
          <div style="display: flex; gap: 5px; align-items: center; justify-content: center; margin-bottom: 5px;">
            <button id="btn-copy">Copy Link</button>
            <button id="btn-share">Share Link</button>
          </div>
          <div style="text-align: center; font-weight: bold; background: #fff; border: inset 2px #dfdfdf; padding: 4px;"
            id="display-room-code">----</div>
          <p id="copy-toast"
            style="display:none; color: #000080; text-align: center; margin-top: 5px; font-weight: bold;">Copied to
            clipboard!</p>
        </fieldset>

        <div class="host-controls" style="margin-top: 15px;">
          <button id="btn-start" style="display:none; font-weight: bold; width: 100%;">Start Game</button>
        </div>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen window" style="max-width: 600px;">
      <div class="title-bar">
        <div class="title-bar-text">Fission_Board.exe</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize"></button>
          <button aria-label="Close"></button>
        </div>
      </div>

      <div class="window-body" style="padding: 10px;">
        <div id="game-info"
          style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <p style="margin: 0; font-weight: bold;">Turn: <span id="current-turn-name">Wait</span></p>
          <p id="game-over-msg" style="display:none; color: #ff0000; font-weight: bold; margin: 0;">THE CHAIN REACTION
            HAS SETTLED.</p>
          <button id="btn-home" style="display:none;">Main Menu</button>
        </div>

        <div class="sunken-panel" style="padding: 2px;">
          <div id="board-container"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>

</html>
